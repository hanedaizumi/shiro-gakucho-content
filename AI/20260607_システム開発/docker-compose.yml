services:
  postgres:
    image: postgres:16-alpine
    container_name: shiro-ai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shiro
      POSTGRES_PASSWORD: shiro_dev_password
      POSTGRES_DB: shiro_ai_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiro -d shiro_ai_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
